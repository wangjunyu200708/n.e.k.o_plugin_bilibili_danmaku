[plugin]
id = "bilibili_danmaku"
name = "B站弹幕监听"
description = "实时监听B站直播间弹幕，过滤后推送给AI分析和回复"
short_description = "Monitor Bilibili live stream danmaku. 无需主动调用。"
keywords = []
passive = true
version = "1.1.0"
entry = "plugin.plugins.bilibili_danmaku:BiliDanmakuPlugin"

[plugin.author]
name = "N.E.K.O Team"

[plugin.sdk]
recommended = ">=0.1.0,<0.2.0"
supported = ">=0.1.0,<0.3.0"

[plugin.i18n]
default_locale = "zh-CN"
locales_dir = "i18n"

[plugin.ui]
enabled = true

[[plugin.ui.panel]]
id = "main"
title = "B站弹幕监听"
entry = "static/index.html"
context = "dashboard"
permissions = ["state:read", "action:call"]

[[plugin.ui.guide]]
id = "quickstart"
title = "快速开始"
entry = "docs/quickstart.md"
mode = "markdown"
permissions = ["state:read"]

[plugin_runtime]
enabled = true
auto_start = false

[plugin.store]
enabled = true

# 运行时依赖（均由 NEKO 内置，无需额外安装）：
#   - websockets  (WebSocket 连接 B站弹幕服务器)
#   - aiohttp     (HTTP 请求获取直播间信息)

